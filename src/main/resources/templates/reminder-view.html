<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart Reminder System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <p><a href="/dashboard">← Back to Dashboard</a></p>

    <div id="reminder-module" class="module-card">
        <h2>3. Smart Reminder System (Scheduler Proof)</h2>
        <p>The background **Quartz Scheduler** checks these events every minute for alerts (Immediate & Advance Alerts).</p>

        <h3>Your Current Reminders</h3>
        <table border="1">
            <thead>
            <tr><th>Title</th><th>Due Date</th><th>Status</th></tr>
            </thead>
            <tbody>
            <tr th:each="reminder : ${reminders}">
                <td th:text="${reminder.title}"></td>
                <td th:text="${#temporals.format(reminder.reminderTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${reminder.isTriggered} ? 'Sent' : 'Pending'"></td>
            </tr>
            </tbody>
        </table>
        <br>

        <h3>Add New Reminder</h3>
        <form action="/reminders/add" method="POST">
            <input type="hidden" name="studentId" value="101"/>
            <label for="title">Title (e.g., Final Presentation):</label><br>
            <input type="text" id="title" name="title" required><br>
            <label for="timeString">Due Time (YYYY-MM-DD HH:MM):</label><br>
            <input type="datetime-local" id="timeString" name="timeString" required><br><br>
            <button type="submit" class="login-btn">Save Reminder</button>
        </form>
    </div>
</div>
</body>
</html>
