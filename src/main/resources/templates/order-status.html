<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Order Status</title></head>
<body>
<h1 th:if="${message}" th:text="${message}" style="color: green;"></h1>
<h1 th:if="${error}" th:text="${error}" style="color: red;"></h1>
<p>Transaction Result:</p>
<ul>
    <li th:if="${message}">Check your IntelliJ Console for the **Email Notification** and the updated **database** tables.</li>
    <li th:if="${error}">The database transaction was rolled back due to failure (e.g., lack of stock).</li>
</ul>
<p><a href="/dashboard">Return to Dashboard</a></p>
</body>
</html>
